<!DOCTYPE html>
<html>
<head>
    <title>CSS Lengkap</title>

    <!-- EXTERNAL CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- INTERNAL CSS -->
    <style>
        body {
            font-family: Arial;
        }

        h1 {
            text-align: center;
            color: blue;
        }

        .text-demo {
            color: darkgreen;
            text-transform: uppercase;
        }

        a:hover {
            color: red;
        }

        table {
            border-collapse: collapse;
            width: 50%;
            margin: auto;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        input:focus {
            background-color: lightyellow;
        }

        /* FLEXBOX */
        .flex-container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .flex-item {
            background: orange;
            padding: 20px;
            flex: 1;
            margin: 5px;
        }

        /* GRID */
        .grid-container {
            display: grid;
            grid-template-columns: auto auto auto;
            gap: 10px;
            margin-top: 20px;
        }

        .grid-item {
            background: lightblue;
            padding: 20px;
            text-align: center;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .content {
                flex-direction: column;
            }

            .flex-container {
                flex-direction: column;
            }

            .grid-container {
                grid-template-columns: auto;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Website CSS</h1>
    </div>

    <div class="nav">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>

    <div class="content">
        <div class="sidebar">
            Sidebar
        </div>

        <div class="main">

            <!-- INLINE CSS -->
            <p style="color:red;">Ini contoh INLINE CSS</p>

            <!-- TEXT -->
            <p class="text-demo">Ini contoh text CSS</p>

            <!-- LINK -->
            <a href="#">Hover link ini</a>

            <!-- TABLE -->
            <h2>Table</h2>
            <table>
                <tr>
                    <th>Nama</th>
                    <th>Umur</th>
                </tr>
                <tr>
                    <td>Juna</td>
                    <td>20</td>
                </tr>
            </table>

            <!-- FORM -->
            <h2>Form</h2>
            <form>
                <input type="text" placeholder="Nama"><br><br>
                <input type="email" placeholder="Email"><br><br>
                <button type="submit">Submit</button>
            </form>

            <!-- FLEXBOX -->
            <h2>Flexbox</h2>
            <div class="flex-container">
                <div class="flex-item">Item 1</div>
                <div class="flex-item">Item 2</div>
                <div class="flex-item">Item 3</div>
            </div>

            <!-- GRID -->
            <h2>Grid</h2>
            <div class="grid-container">
                <div class="grid-item">1</div>
                <div class="grid-item">2</div>
                <div class="grid-item">3</div>
            </div>

            <!-- BORDER IMAGE -->
            <div class="border-box">
                Ini contoh Border Image
            </div>

        </div>
    </div>

</body>
</html>
